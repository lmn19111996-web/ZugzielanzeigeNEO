<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#161B75">
  <title>Benachrichtigungen – Zugzielanzeige</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1333;
      color: #e8eaf6;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #1a2050;
      border: 1px solid #2a3060;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #c5cae9;
      letter-spacing: 0.02em;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
      color: #9fa8da;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #455a9e;
    }
    .dot.green  { background: #4caf7d; }
    .dot.yellow { background: #ffc107; }
    .dot.red    { background: #ef5350; }

    .status-label {
      font-weight: 500;
      color: #e8eaf6;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a3060;
    }

    .btn {
      padding: 0.8rem 1.4rem;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn:not(:disabled):hover { opacity: 0.85; }

    .btn-subscribe   { background: #3f51b5; color: #fff; }
    .btn-unsubscribe { background: #37474f; color: #cfd8dc; }
    .btn-test        { background: #1e3a5f; color: #90caf9; border: 1px solid #2a5a9e; }

    .notice {
      font-size: 0.82rem;
      color: #7986cb;
      line-height: 1.5;
    }

    .back-link {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #5c6bc0;
      text-decoration: none;
    }
    .back-link:hover { color: #9fa8da; }

    #log {
      font-size: 0.78rem;
      color: #7986cb;
      background: #111827;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 3rem;
      display: none;
    }
    #log.visible { display: block; }
  </style>
</head>
<body>

<div class="card">
  <h1>🔔 Push-Benachrichtigungen</h1>

  <div>
    <div class="status-row" id="row-permission">
      <span class="dot" id="dot-permission"></span>
      <span>Browser-Berechtigung: <span class="status-label" id="label-permission">…</span></span>
    </div>
    <div class="status-row" style="margin-top:0.6rem" id="row-sub">
      <span class="dot" id="dot-sub"></span>
      <span>Dieses Gerät: <span class="status-label" id="label-sub">…</span></span>
    </div>
    <div class="status-row" style="margin-top:0.6rem">
      <span class="dot" id="dot-server"></span>
      <span>Server: <span class="status-label" id="label-server">…</span></span>
    </div>
  </div>

  <hr class="divider">

  <button class="btn btn-subscribe"   id="btn-subscribe"   disabled>Auf diesem Gerät anmelden</button>
  <button class="btn btn-unsubscribe" id="btn-unsubscribe" disabled>Von diesem Gerät abmelden</button>
  <button class="btn btn-test"        id="btn-test"        disabled>Test-Benachrichtigung senden</button>

  <p class="notice">
    Jedes Gerät, das sich hier anmeldet, empfängt alle Abfahrts-Benachrichtigungen –
    auch wenn die App vollständig geschlossen ist. Gerät abmelden, um keine
    Benachrichtigungen mehr zu erhalten.
  </p>

  <div id="log"></div>
</div>

<a class="back-link" href="/">← Zurück zur App</a>

<script>
  const $ = id => document.getElementById(id);
  const log = (msg, color) => {
    const el = $('log');
    el.classList.add('visible');
    el.textContent += (el.textContent ? '\n' : '') + msg;
    if (color) el.style.color = color;
  };

  function setDot(id, state) {
    const d = $(id);
    d.className = 'dot ' + (state === 'ok' ? 'green' : state === 'warn' ? 'yellow' : state === 'err' ? 'red' : '');
  }

  async function refresh() {
    // Permission
    const perm = Notification.permission;
    $('label-permission').textContent = perm === 'granted' ? 'Erlaubt' : perm === 'denied' ? 'Verweigert' : 'Nicht gesetzt';
    setDot('dot-permission', perm === 'granted' ? 'ok' : perm === 'denied' ? 'err' : 'warn');

    // Local subscription
    const hasSW = 'serviceWorker' in navigator && 'PushManager' in window;
    if (!hasSW) {
      $('label-sub').textContent = 'Nicht unterstützt';
      setDot('dot-sub', 'err');
      $('label-server').textContent = '–';
      setDot('dot-server', '');
      return;
    }

    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      $('label-sub').textContent = sub ? 'Angemeldet' : 'Nicht angemeldet';
      setDot('dot-sub', sub ? 'ok' : '');
      $('btn-subscribe').disabled   = !!sub || perm === 'denied';
      $('btn-unsubscribe').disabled = !sub;
      $('btn-test').disabled        = !sub;
    } catch (e) {
      $('label-sub').textContent = 'Fehler';
      setDot('dot-sub', 'err');
    }

    // Server state
    try {
      const r = await fetch('/api/push/debug');
      if (r.ok) {
        const d = await r.json();
        const vapid = d.vapidConfigured;
        $('label-server').textContent = vapid
          ? `Aktiv · ${d.subscriptionCount} Gerät(e) · ${d.pendingEventCount} geplante Benachrichtigung(en)`
          : 'VAPID nicht konfiguriert';
        setDot('dot-server', vapid ? 'ok' : 'err');
      } else {
        $('label-server').textContent = 'Nicht erreichbar';
        setDot('dot-server', 'warn');
      }
    } catch {
      $('label-server').textContent = 'Nicht erreichbar';
      setDot('dot-server', 'warn');
    }
  }

  function urlBase64ToUint8Array(b64) {
    const pad = '='.repeat((4 - b64.length % 4) % 4);
    const base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
    const raw = atob(base64);
    return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
  }

  $('btn-subscribe').addEventListener('click', async () => {
    log('Berechtigungen anfragen…');
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { log('Berechtigung verweigert.', '#ef9a9a'); await refresh(); return; }

    try {
      log('VAPID-Schlüssel laden…');
      const kr = await fetch('/api/push/vapid-public-key');
      if (!kr.ok) { log('Server: VAPID nicht konfiguriert.', '#ef9a9a'); return; }
      const { publicKey } = await kr.json();

      log('Service Worker bereit machen…');
      const reg = await navigator.serviceWorker.ready;

      log('Push-Abo erstellen…');
      const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(publicKey) });

      log('Abo beim Server registrieren…');
      const rr = await fetch('/api/push/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sub.toJSON()) });
      if (rr.ok) log('✅ Gerät erfolgreich angemeldet.', '#a5d6a7');
      else log('Fehler beim Server: ' + rr.status, '#ef9a9a');
    } catch (e) {
      log('Fehler: ' + e.message, '#ef9a9a');
    }
    await refresh();
  });

  $('btn-unsubscribe').addEventListener('click', async () => {
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (!sub) { log('Kein aktives Abo gefunden.'); await refresh(); return; }

      log('Abo beim Browser beenden…');
      await sub.unsubscribe();

      log('Abo beim Server entfernen…');
      await fetch('/api/push/unsubscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ endpoint: sub.endpoint }) });
      log('✅ Gerät erfolgreich abgemeldet.', '#a5d6a7');
    } catch (e) {
      log('Fehler: ' + e.message, '#ef9a9a');
    }
    await refresh();
  });

  $('btn-test').addEventListener('click', async () => {
    log('Test-Benachrichtigung wird gesendet…');
    try {
      const reg = await navigator.serviceWorker.ready;
      await reg.showNotification('Test – Zugzielanzeige', {
        body: 'Push-Benachrichtigungen funktionieren auf diesem Gerät.',
        icon: '/res/6.png',
        vibrate: [200, 100, 200],
        tag: 'push-settings-test-' + Date.now()
      });
      log('✅ Testbenachrichtigung gesendet.', '#a5d6a7');
    } catch (e) {
      log('Fehler: ' + e.message, '#ef9a9a');
    }
  });

  // Register SW if not already done, then refresh status
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js').then(() => refresh()).catch(() => refresh());
  } else {
    refresh();
  }
</script>
</body>
</html>
